spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: kafka-guarantees-lab-group
      retry:
        interval-ms: 1000
        max-attempts: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      languagePreferenceProducer:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 30s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
      languagePreferenceConsumer:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10

  retry:
    instances:
      languagePreferenceProducer:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.lang.Exception
      languagePreferenceConsumer:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.lang.Exception
